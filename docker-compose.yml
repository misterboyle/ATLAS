# x-host-gateway: YAML anchor for host DNS resolution in all services
x-host-gateway: &host-gateway
  - "host.docker.internal:host-gateway"

services:
  # --- llama-lifecycle (signal-file bridge to host llama-server) ---
  # Replaces the NVIDIA CUDA llama-server container.
  # llama-server runs natively on Windows (AMD ROCm); this Alpine container
  # manages start/stop/swap via signal files shared with llama-bridge.py.
  llama-lifecycle:
    image: alpine:3.20
    volumes:
      - ./signals:/signals
      - ./scripts/lib/llama-lifecycle.sh:/llama-lifecycle.sh:ro
    extra_hosts: *host-gateway
    command: ["sh", "/llama-lifecycle.sh"]
    ports:
      - "${ATLAS_LIFECYCLE_PORT:-8085}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--timeout=5", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - atlas

  # --- Geometric Lens (C(x)/G(x) scoring) ---
  geometric-lens:
    build:
      context: ./geometric-lens
    environment:
      - LLAMA_URL=http://host.docker.internal:8090
      - LLAMA_EMBED_URL=http://host.docker.internal:8090
      - GEOMETRIC_LENS_ENABLED=true
      - PROJECT_DATA_DIR=/data/projects
    volumes:
      - lens-data:/data/projects
      - ${ATLAS_LENS_MODELS:-./geometric-lens/geometric_lens/models}:/app/geometric_lens/models:ro
    ports:
      - "${ATLAS_LENS_PORT:-8099}:8099"
    extra_hosts: *host-gateway
    depends_on:
      llama-lifecycle:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8099/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - atlas

  # --- V3 Pipeline Service ---
  v3-service:
    build:
      context: .
      dockerfile: v3-service/Dockerfile
    environment:
      - ATLAS_INFERENCE_URL=http://host.docker.internal:8090
      - ATLAS_LENS_URL=http://geometric-lens:8099
      - ATLAS_SANDBOX_URL=http://sandbox:8020
      - ATLAS_MODEL_NAME=${ATLAS_MODEL_NAME:-Qwen3.5-9B-Q6_K}
    ports:
      - "${ATLAS_V3_PORT:-8070}:8070"
    extra_hosts: *host-gateway
    depends_on:
      llama-lifecycle:
        condition: service_healthy
      geometric-lens:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8070/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - atlas

  # --- Sandbox (isolated code execution) ---
  sandbox:
    build:
      context: ./sandbox
    environment:
      - TMPDIR=/tmp
      - HOME=/tmp/home
      - GOPATH=/tmp/go
      - GOMODCACHE=/tmp/go/pkg/mod
      - GOCACHE=/tmp/go-cache
      - CARGO_HOME=/tmp/cargo
      - RUSTUP_HOME=/tmp/rustup
      - npm_config_cache=/tmp/npm-cache
    tmpfs:
      - /tmp:size=512M,exec
    read_only: true
    security_opt:
      - no-new-privileges:true
    ports:
      - "${ATLAS_SANDBOX_PORT:-30820}:8020"
    extra_hosts: *host-gateway
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8020/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - atlas

  # --- ATLAS Proxy v2 (agent loop + grammar + Aider format) ---
  atlas-proxy:
    build:
      context: ./atlas-proxy
    environment:
      - ATLAS_PROXY_PORT=8090
      - ATLAS_INFERENCE_URL=http://host.docker.internal:8090
      - ATLAS_LLAMA_URL=http://host.docker.internal:8090
      - ATLAS_LENS_URL=http://geometric-lens:8099
      - ATLAS_SANDBOX_URL=http://sandbox:8020
      - ATLAS_V3_URL=http://v3-service:8070
      - ATLAS_AGENT_LOOP=1
      - ATLAS_MODEL_NAME=${ATLAS_MODEL_NAME:-Qwen3.5-9B-Q6_K}
    ports:
      - "${ATLAS_PROXY_PORT:-8090}:8090"
    extra_hosts: *host-gateway
    depends_on:
      llama-lifecycle:
        condition: service_healthy
      geometric-lens:
        condition: service_healthy
      v3-service:
        condition: service_healthy
      sandbox:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atlas

volumes:
  lens-data:

networks:
  atlas:
    driver: bridge
